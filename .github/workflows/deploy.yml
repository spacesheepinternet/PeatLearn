name: Deploy to peatlearn.com

# Every push to main goes live: SSH into the self-hosted server, pull the new
# code, and rebuild the docker-compose stack (api + web). The web image builds
# the React SPA internally (web/Dockerfile), so no separate frontend build step
# is needed here.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST      server hostname or IP (e.g. peatlearn.com or 203.0.113.4)
#   SSH_USER      ssh login user (e.g. deploy)
#   SSH_KEY       the PRIVATE key whose public half is in the server's
#                 ~/.ssh/authorized_keys
# Optional:
#   SSH_PORT      ssh port (defaults to 22)
#   DEPLOY_PATH   absolute path to the repo on the server
#                 (defaults to /opt/peatlearn)

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

# Never run two deploys at once; cancel an in-flight deploy if a newer push lands.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH || '/opt/peatlearn' }}"
            echo "Deploying $(git rev-parse --short HEAD 2>/dev/null || echo '?') -> latest"
            git fetch --all --prune
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "Deploy complete."
