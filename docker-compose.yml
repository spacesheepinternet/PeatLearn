# Full PeatLearn stack — self-hosted, no third-party PaaS.
#
#   api : FastAPI serving the 9.64/10 RAG pipeline (app/web_api.py)
#   web : Caddy serving the Vite/React SPA + reverse-proxying /api -> api,
#         with automatic HTTPS in production.
#
# Local:       docker compose up --build           -> http://localhost
# Production:  set SITE_ADDRESS + ACME_EMAIL in .env, then
#              docker compose up -d --build         -> https://your-domain.com
#
# Frontend dev (hot reload, no containers): cd web && npm install && npm run dev
# (needs the api running: uvicorn app.web_api:app --port 8080)

services:
  api:
    build: .
    image: peatlearn-api
    env_file:
      - .env
    environment:
      # Behind Caddy the frontend is same-origin, so CORS is only needed for
      # the Vite dev server and any direct API access.
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      # Cost controls (per-IP/day and total/day). Override here as needed.
      DAILY_LIMIT_PER_IP: "${DAILY_LIMIT_PER_IP:-10}"
      DAILY_GLOBAL_CAP: "${DAILY_GLOBAL_CAP:-0}"
      RATE_DB_PATH: "/data/ratelimit.db"
      # Conversation log (questions + answers) on the same persisted volume.
      CONV_DB_PATH: "/data/conversations.db"
      CONV_HASH_SALT: "${CONV_HASH_SALT:-}"
    expose:
      - "8080"
    # Bind to localhost only — reachable on the host itself for debugging, but
    # NOT exposed to the public internet (Caddy reaches it via the compose
    # network at api:8080). Public traffic goes through Caddy on 80/443.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ratelimit_data:/data
    restart: unless-stopped

  web:
    build: ./web
    image: peatlearn-web
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Local default serves plain HTTP on :80. In production set
      # SITE_ADDRESS=your-domain.com and ACME_EMAIL=you@example.com in .env.
      SITE_ADDRESS: "${SITE_ADDRESS:-:80}"
      ACME_EMAIL: "${ACME_EMAIL:-}"
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  ratelimit_data:
